name: Build Status

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - uses: ./setup

    - name: Verify tools (Linux / macOS)
      run: |
        clang-format --dry-run --Werror tests/hello.cpp
        ccache c++ tests/hello.cpp -o hello
        ./hello
        ccache --show-stats
      shell: bash
      if: runner.os != 'Windows'

    - name: Verify tools (Windows)
      run: |
        if not "%CC%"=="sccache cl" exit /b 1
        where cl
        where sccache
        clang-format --dry-run --Werror tests\hello.cpp
        sccache cl /nologo /EHsc tests\hello.cpp /Fe:hello.exe
        hello.exe
        sccache --show-stats
      shell: cmd
      if: runner.os == 'Windows'
